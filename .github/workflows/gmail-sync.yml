name: Gmail sync
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: gmail-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/gmail/sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body -sS --max-time 90 \
            -w "\nHTTP %{http_code}\n" \
            "https://rps-maintenance.vercel.app/api/gmail/sync?secret=$CRON_SECRET&max=30"
